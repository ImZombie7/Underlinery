<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Underlinery</title>
<style>
body { background:#111;color:white;text-align:center;font-family:Arial; }
#grid { display:grid;grid-template-columns:repeat(11,30px);gap:2px;justify-content:center;margin:20px auto; }
.cell { width:30px;height:30px;background:#222;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px; }
.cell.marked { background:limegreen;color:black; }
.cell.selected { outline:2px solid yellow; }
#credit { position:fixed;bottom:8px;right:10px;font-size:12px;opacity:.6; }
#credit a { color:white;text-decoration:none; }
</style>
</head>
<body>

<h1>Underlinery</h1>

<div id="auth">
<input id="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<button id="loginBtn">Login</button>
<button id="registerBtn">Register</button>
</div>

<div id="status"></div>
<div id="grid"></div>
<div id="ticks"></div>
<div id="called-numbers"></div>

<input id="numberInput" type="number" placeholder="Number" />
<button id="actionBtn">Submit</button>
<button id="lockBtn">Lock Grid</button>

<div id="credit">
<a href="https://github.com/ImZombie7/Underlinery" target="_blank">
By Nayart The Zombie
</a>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
