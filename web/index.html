<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underlinery</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:system-ui,sans-serif;
  text-align:center;
}

#grid{
  display:grid;
  grid-template-columns:repeat(11,32px);
  gap:3px;
  justify-content:center;
  margin:25px auto;
}

.cell{
  width:32px;
  height:32px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.cell.marked{
  background:limegreen;
  color:black;
}

#status{
  margin-top:10px;
}

#credit{
  margin-top:20px;
}

#credit a{
  color:limegreen;
}
</style>
</head>

<body>

  <h1>Underlinery</h1>

  <div id="auth">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Email" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" />
    <br />
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
  </div>

  <div id="status"></div>

  <div id="grid"></div>

<div id="auth">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button id="loginBtn">Login</button>
<button id="registerBtn">Register</button>
</div>

<div id="status"></div>
<div id="grid"></div>
<div id="ticks"></div>
<div id="called"></div>

<div id="credit">
<a href="https://github.com/ImZombie7/Underlinery">
By Nayart The Zombie
</a>
</div>

<script type="module" src="main.js"></script>

</body>
</html>
